<div class="heading pt-5 pb-3 d-flex">
  <div>
    <div class="text-muted sr-item">Featured</div>
    <h5 class="text-highlight sr-item">Albums</h5>
  </div>
  <span class="flex"></span>
</div>

<div class="album-slider-wrapper">
  <div class="album-slider">
    @for (album of albumDto; track album.id; let i = $index) {
      <div class="slider-item" [attr.data-id]="album.id">
        <div class="list-item r list-hover">
          <div class="media">
            <a
              [href]="'item.detail.html#' + album.id"
              class="ajax media-content"
              [style.background-image]="
                'url(' +
                (album.coverImageUrl ? album.coverImageUrl : '../assets/img/c' + (i % 8) + '.jpg') +
                ')'
              "
            >
            </a>

            <div class="media-action media-action-overlay">
              <button class="btn btn-icon no-bg no-shadow hide-row" data-toggle-class>
                <i data-feather="heart" class="active-fill"></i>
              </button>
              <button class="btn btn-raised btn-icon btn-rounded bg--white btn-play">
                <i data-feather="play"></i>
              </button>
              <button class="btn btn-icon no-bg no-shadow hide-row btn-more" data-toggle="dropdown">
                <i data-feather="more-horizontal"></i>
              </button>
              <div class="dropdown-menu dropdown-menu-right"></div>
            </div>
          </div>

          <div class="list-content text-center">
            <div class="list-body">
              <a [href]="'item.detail.html#' + album.id" class="list-title title ajax h-1x">
                {{ album.name }}
              </a>
              <a
                [href]="'artist.detail.html#' + album.artistId"
                class="list-subtitle d-block text-muted h-1x subtitle ajax"
              >
                {{ album.artist?.name || 'Bilinmeyen Sanatçı' }}
              </a>
            </div>
          </div>
        </div>
      </div>
    } @empty {
      <div class="p-4 text-muted w-100 text-center">Şu an gösterilecek albüm bulunmuyor.</div>
    }
  </div>
</div>
