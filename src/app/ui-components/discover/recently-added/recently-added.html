<div class="heading pt-5 pb-3 d-flex">
  <div>
    <div class="text-muted sr-item">User</div>
    <h5 class="text-highlight sr-item">Recently added</h5>
  </div>
  <span class="flex"></span>
</div>

<div class="row list-row list-index">
  @for (song of last5Song; track song.id; let i = $index) {
    <div
      class="col-12"
      [attr.data-id]="song.id"
      [attr.data-category]="song.category?.name || 'Unknown'"
      [attr.data-source]="song.audioUrl"
    >
      <div class="list-item r">
        <div class="media">
          <a
            [href]="'item.detail.html#' + song.id"
            class="ajax media-content"
            [style.backgroundImage]="'url(' + (song.album?.coverImageUrl ? song.album.coverImageUrl : './assets/img/c' + (i % 8) + '.jpg') + ')'"
          >
          </a>
          <div class="media-action media-action-overlay">
            <button class="btn btn-icon no-bg no-shadow hide-row" data-toggle-class>
              <i data-feather="heart" class="active-fill"></i>
            </button>
            <button class="btn btn-raised btn-icon btn-rounded bg--white btn-play">
              <i data-feather="play"></i>
            </button>
            <button
              class="btn btn-icon no-bg no-shadow hide-row btn-more"
              data-toggle="dropdown"
            >
              <i data-feather="more-horizontal"></i>
            </button>
            <div class="dropdown-menu dropdown-menu-right"></div>
          </div>
        </div>

        <div class="list-content text-center">
          <div class="list-body">
            <a [href]="'item.detail.html#' + song.id" class="list-title title ajax h-1x">
              {{ song.title }}
            </a>
            <a
              [href]="'artist.detail.html#' + song.artistId"
              class="list-subtitle d-block text-muted h-1x subtitle ajax"
            >
              {{ song.artist?.name || 'Bilinmeyen Sanatçı' }}
            </a>
          </div>
        </div>

        <div class="list-action show-row">
          <div class="d-flex align-items-center">
            <div class="px-3 text-sm text-muted d-none d-md-block">03:00</div>
            <button class="btn btn-icon no-bg no-shadow" data-toggle-class>
              <i data-feather="heart" class="active-primary"></i>
            </button>
            <button
              class="btn btn-icon no-bg no-shadow btn-more"
              data-toggle="dropdown"
            >
              <i data-feather="more-horizontal"></i>
            </button>
            <div class="dropdown-menu dropdown-menu-right"></div>
          </div>
        </div>
      </div>
    </div>
  } @empty {
    <div class="col-12 p-4 text-center text-muted">
      Henüz eklenen bir şarkı yok.
    </div>
  }
</div>
