<div class="d-flex flex-column vh-100">
    <div class="row no-gutters h-100 flex-grow-1">

        <div class="col-md-6 bg-dark bg-img" style="background-image:url('../assets/img/b6.jpg'); background-size: cover; background-position: center;">
            <div class="p-3 p-md-5 d-flex flex-column h-100">
                <h4 class="mb-3 text-white">Bepop</h4>
                <div class="text-fade">Music Web Application</div>
                <div class="d-flex flex align-items-center justify-content-center flex-grow-1">
                    </div>
                <div class="d-flex text-sm text-fade">
                    <a routerLink="/" class="text-white">About</a>
                    <span class="flex"></span>
                    <a href="javascript:void(0)" class="text-white mx-1">Terms</a>
                    <a href="javascript:void(0)" class="text-white mx-1">Policy</a>
                </div>
            </div>
        </div>

        <div class="col-md-6 d-flex align-items-center justify-content-center" id="content-body">
            <div class="p-4 p-md-5 w-100" style="max-width: 450px;">
                <h5 class="mb-1">Welcome back</h5>
                <p class="mb-4">
                    <small class="text-muted">Login to manage your account</small>
                </p>

                <form role="form" (ngSubmit)="login()">
                    <div class="form-group mb-3">
                        <label class="text-muted">Email</label>
                        <input type="email" class="form-control" placeholder="Enter email"
                               name="email" [(ngModel)]="loginDto.email" required autocomplete="username">
                    </div>

                    <div class="form-group mb-4">
                        <label class="text-muted">Password</label>
                        <input type="password" class="form-control" placeholder="Password"
                               name="password" [(ngModel)]="loginDto.password" required autocomplete="current-password">
                        <div class="mt-2 text-right">
                            <a href="javascript:void(0)" class="text-muted"><small>Forgot password?</small></a>
                        </div>
                    </div>

                    <div class="checkbox mb-4">
                        <label class="ui-check text-muted">
                            <input type="checkbox" name="rememberMe">
                            <i></i> Remember me
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block mb-4 w-100">Sign in</button>

                    <div class="text-center text-muted">Do not have an account?
                        <a routerLink="/signup" class="text-primary">Sign up</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
