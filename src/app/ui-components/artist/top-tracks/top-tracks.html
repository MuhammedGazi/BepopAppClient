<h6 class="text text-muted sr-item">Top tracks</h6>
<div class="row list-row">

  @for (song of songDto; track song.id) {
  <div class="col-12" [attr.data-id]="song.id" [attr.data-category]="song.categoryId"
    [attr.data-source]="song.audioUrl">
    <div class="list-item r">
      <div class="media">

        <a class="ajax media-content"
          [style.background-image]="'url(' + (song.album?.coverImageUrl || '../assets/img/c20.jpg') + ')'">
        </a>

        <div class="media-action">

          <button class="btn btn-icon no-bg no-shadow hide-row" data-toggle-class>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="active-fill">
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
              </path>
            </svg>
          </button>

          <button class="btn btn-raised btn-icon btn-rounded bg--white btn-play"
            style="display: flex; align-items: center; justify-content: center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="black"
              stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </button>

          <button class="btn btn-icon no-bg no-shadow hide-row btn-more" data-toggle="dropdown">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="1"></circle>
              <circle cx="19" cy="12" r="1"></circle>
              <circle cx="5" cy="12" r="1"></circle>
            </svg>
          </button>

          <div class="dropdown-menu dropdown-menu-right"></div>
        </div>
      </div>

      <div class="list-content">
        <div class="list-body">
          <a  class="list-title title ajax h-1x">
            {{ song.title }}
          </a>

          <a
            class="list-subtitle d-block text-muted h-1x subtitle ajax">
            {{ song.artist?.name || 'Bilinmeyen Sanatçı' }}
          </a>
        </div>
      </div>
    </div>
  </div>
  } @empty {
  <div class="col-12 text-center text-muted py-3">
    Henüz popüler bir şarkı bulunmuyor.
  </div>
  }

</div>
