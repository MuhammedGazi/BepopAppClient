@if (currentSong) {
<div class="bepop-custom-player">

  <audio #audioPlayer autoplay [src]="currentSong.audioUrl"
         (playing)="onAudioPlaying()"
         (pause)="onAudioPaused()"></audio>

  <div class="player-left">
    <img [src]="currentSong.coverImageUrl || '../assets/img/c1.jpg'" class="player-cover" alt="Kapak">
    <div class="player-info">
      <span class="player-title">{{ currentSong.title }}</span>
      <span class="player-artist">{{ currentSong.artist?.name || 'Bilinmeyen Sanatçı' }}</span>
    </div>
  </div>

  <div class="player-center">

    <button class="control-btn play-btn"
            (click)="audioPlayer.play()"
            [class.active]="isPlaying">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
    </button>

    <button class="control-btn pause-btn"
            (click)="audioPlayer.pause()"
            [class.active]="!isPlaying">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16"></rect>
        <rect x="14" y="4" width="4" height="16"></rect>
      </svg>
    </button>
  </div>

  <div class="player-right"></div>
</div>
}

@if (errorData) {
<div class="modal fade show d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.6); z-index: 1050;">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-0 shadow-lg">
      <div class="modal-header border-bottom-0">
        <h5 class="modal-title text-danger">⚠️ {{ errorData.title }}</h5>
        <button type="button" class="btn-close btn-close-white" (click)="closeError()"></button>
      </div>
      <div class="modal-body text-muted">
        <p>{{ errorData.description }}</p>
      </div>
      <div class="modal-footer border-top-0">
        <button type="button" class="btn btn-secondary" (click)="closeError()">Kapat</button>
        <a href="#" class="btn btn-primary" (click)="closeError()">Paketleri İncele</a>
      </div>
    </div>
  </div>
</div>
}
